<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Bento Pro - Multi Playlist & Search</title>
    <style>
        :root {
            --winamp-bg: #383d49;
            --winamp-dark: #1a1a1b;
            --winamp-display: #000000;
            --winamp-green: #00ff00;
            --winamp-text: #b4b9c5;
            --winamp-yellow: #ffff00;
            --active-blue: #204a87;
        }

        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px 0;
            font-family: Arial, sans-serif;
            color: var(--winamp-text);
        }

        #winamp-container {
            width: 420px;
            background: var(--winamp-bg);
            border: 1px solid #111;
            border-radius: 4px;
            padding: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .top-bar {
            height: 22px;
            background: linear-gradient(to bottom, #5d6475, #383d49);
            font-size: 10px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-weight: bold;
            border-bottom: 1px solid #111;
        }

        /* LCD Display & Visualizer */
        .display-panel {
            background: var(--winamp-display);
            margin: 8px 5px;
            padding: 10px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        #time-display {
            font-family: 'Courier New', monospace;
            font-size: 30px;
            color: var(--winamp-green);
            font-weight: bold;
        }

        #visualizer {
            width: 120px;
            height: 50px;
            background: #000;
        }

        /* Controls */
        .controls { display: flex; gap: 3px; padding: 5px; flex-wrap: wrap; }
        .btn {
            background: linear-gradient(to bottom, #5d6475, #2a2e38);
            border: 1px solid #000;
            color: #eee;
            padding: 4px 8px;
            font-size: 9px;
            cursor: pointer;
            min-width: 45px;
            text-transform: uppercase;
        }
        .btn.active { background: #005500; color: var(--winamp-green); border-color: var(--winamp-green); }

        /* Search Bar */
        .search-container { padding: 0 5px; margin-bottom: 5px; }
        #search-input {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--winamp-green);
            font-size: 11px;
            padding: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* Category Grid */
        .category-container { margin: 5px; padding: 5px; background: #272b35; border: 1px inset #111; }
        .category-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .cat-btn {
            background: #444b59; border: 1px solid #111; color: #bdc5d6;
            font-size: 8px; padding: 4px 2px; cursor: pointer; text-align: center;
        }
        .cat-btn.active { background: var(--active-blue); color: white; }

        /* Playlist Area */
        .playlist-area {
            background: #000; height: 180px; margin: 0 5px 5px;
            border: 1px solid #444; overflow-y: auto; position: relative;
        }
        .playlist-item {
            display: flex; justify-content: space-between; padding: 5px 10px;
            font-size: 11px; color: var(--winamp-yellow); cursor: pointer; border-bottom: 1px solid #111;
        }
        .playlist-item.active { background: var(--active-blue); color: white; }
        .empty-msg {
            color: #666; text-align: center; margin-top: 70px; font-style: italic; font-size: 12px;
        }

        input[type=range] { width: 96%; margin: 5px 8px; accent-color: var(--winamp-green); cursor: pointer; }
    </style>
</head>
<body>

<div id="winamp-container">
    <div class="top-bar">WINAMP 5.92 - IPPNUDA PLAYER</div>
    
    <div class="display-panel">
        <div class="lcd-text">
            <div id="time-display">00:00</div>
            <div id="song-title" style="font-size: 10px; width: 200px; overflow: hidden; white-space: nowrap;">Pilih Folder Peterpan...</div>
        </div>
        <canvas id="visualizer"></canvas>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevTrack()">PREV</button>
        <button class="btn" onclick="playTrack()">PLAY</button>
        <button class="btn" onclick="pauseTrack()">PAUSE</button>
        <button class="btn" onclick="stopTrack()">STOP</button>
        <button class="btn" onclick="nextTrack()">NEXT</button>
        <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHUFFLE</button>
    </div>

    <input type="range" id="seek-bar" value="0" max="100">

    <div class="category-container">
        <div class="category-grid" id="category-list"></div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Cari judul lagu di playlist ini..." oninput="renderPlaylist()">
    </div>

    <div class="playlist-area" id="playlist"></div>
</div>

<audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    const masterPlaylists = {
        "Pop": [
            { title: "Ada Apa Denganmu", url: "music/1. Peterpan - Ada Apa Denganmu .mp3", duration: "4:41" },
            { title: "Mungkin Nanti", url: "music/2. Peterpan - Mungkin Nanti.mp3", duration: "4:29" },
            { title: "Khayalan Tingkat tinggi", url: "music/3. Peterpan - Khayalan Tingkat.mp3", duration: "3:36" },
            { title: "Dibelakangku", url: "music/4. Peterpan - Di Belakangku.mp3", duration: "3:45" },
            { title: "Ku Katakan Dengan Indah", url: "music/5. Peterpan - Ku Katakan Dengan Indah.mp3", duration: "5:34" },
            { title: "2 DSD", url: "music/6. Peterpan - 2 DSD.mp3", duration: "3:41" },
            { title: "Diatas Normal", url: "music/7. Peterpan - Diatas Normal.mp3", duration: "3:35" },
            { title: "Aku", url: "music/8.Peterpan - Aku.mp3", duration: "3:02" },
            { title: "Masa Lalu Tertinggal", url: "music/9. Peterpan - Masa Lalu Tertinggal.mp3", duration: "3:57" },
            { title: "Bintang Di Surga", url: "music/10. Peterpan - Bintang Di Surga.mp3", duration: "5:02" }
        ],
        "Obro-obrog": [],
        "Sholawatan": [],
        "Dangdut": [],
        "Anak-anak": [],
        "Tarling": [],
        "Barat": [],
        "Qiro": [],
        "Ceramah": [],
        "Murotal": []
    };

    let currentCat = "Pop";
    let currentTrackIndex = 0;
    let isShuffle = false;

    const audio = document.getElementById('audio-player');
    const playlistElement = document.getElementById('playlist');
    const categoryElement = document.getElementById('category-list');
    const timeDisplay = document.getElementById('time-display');
    const songTitleDisplay = document.getElementById('song-title');
    const seekBar = document.getElementById('seek-bar');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const searchInput = document.getElementById('search-input');

    // VISUALIZER
    let audioCtx, analyser, canvas, ctx, source;

    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 64;
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = (canvas.width / bufferLength) * 2;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const barHeight = dataArray[i] / 2;
            ctx.fillStyle = `rgb(0, ${dataArray[i] + 100}, 0)`;
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            x += barWidth + 2;
        }
    }

    function renderCategories() {
        categoryElement.innerHTML = "";
        Object.keys(masterPlaylists).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-btn ${cat === currentCat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCategory(cat);
            categoryElement.appendChild(btn);
        });
    }

    function switchCategory(cat) {
        currentCat = cat;
        searchInput.value = ""; 
        renderCategories();
        if (masterPlaylists[cat].length > 0) {
            loadTrack(0);
            audio.play();
        } else {
            renderPlaylist();
            songTitleDisplay.innerText = "Playlist Kosong";
            audio.src = "";
            timeDisplay.innerText = "00:00";
        }
    }

    function renderPlaylist() {
        playlistElement.innerHTML = "";
        const filter = searchInput.value.toLowerCase();
        const songs = masterPlaylists[currentCat];

        if (songs.length === 0) {
            playlistElement.innerHTML = '<div class="empty-msg">Playlist Kosong</div>';
            return;
        }

        songs.forEach((song, index) => {
            if (song.title.toLowerCase().includes(filter)) {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `<span>${index + 1}. ${song.title}</span><span class="dur">${song.duration}</span>`;
                item.onclick = () => playSpecific(index);
                playlistElement.appendChild(item);
            }
        });
    }

    function loadTrack(index) {
        const songs = masterPlaylists[currentCat];
        if (songs.length === 0) return;
        currentTrackIndex = index;
        audio.src = songs[index].url;
        songTitleDisplay.innerText = `${index + 1}. ${songs[index].title}`;
        renderPlaylist();
    }

    function toggleShuffle() { isShuffle = !isShuffle; shuffleBtn.classList.toggle('active'); }

    function playTrack() {
        initVisualizer();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (masterPlaylists[currentCat].length > 0) audio.play();
    }

    function nextTrack() {
        const songs = masterPlaylists[currentCat];
        if (songs.length === 0) return;
        if (isShuffle) {
            currentTrackIndex = Math.floor(Math.random() * songs.length);
        } else {
            currentTrackIndex = (currentTrackIndex + 1) % songs.length;
        }
        loadTrack(currentTrackIndex);
        audio.play();
    }

    function prevTrack() {
        const songs = masterPlaylists[currentCat];
        if (songs.length === 0) return;
        currentTrackIndex = (currentTrackIndex - 1 + songs.length) % songs.length;
        loadTrack(currentTrackIndex);
        audio.play();
    }

    function pauseTrack() { audio.pause(); }
    function stopTrack() { audio.pause(); audio.currentTime = 0; }
    function playSpecific(index) { loadTrack(index); audio.play(); }

    audio.addEventListener('timeupdate', () => {
        seekBar.value = (audio.currentTime / audio.duration) * 100 || 0;
        let m = Math.floor(audio.currentTime / 60);
        let s = Math.floor(audio.currentTime % 60);
        timeDisplay.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    });

    seekBar.oninput = () => { audio.currentTime = (seekBar.value / 100) * audio.duration; };
    audio.addEventListener('ended', nextTrack);

    renderCategories();
    loadTrack(0);
</script>
</body>
</html>
