<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Bento</title>
    <style>
        :root {
            --winamp-bg: #383d49;
            --winamp-display: #000000;
            --winamp-green: #00ff00;
            --winamp-text: #b4b9c5;
            --winamp-yellow: #ffff00;
            --active-blue: #204a87;
        }

        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: var(--winamp-text);
        }

        #winamp-container {
            width: 400px;
            background: var(--winamp-bg);
            border: 1px solid #111;
            border-radius: 4px;
            padding: 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        /* Panel LCD Atas */
        .display-panel {
            background: var(--winamp-display);
            margin: 5px;
            padding: 12px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
        }

        #time-display {
            font-family: 'Courier New', monospace;
            font-size: 32px;
            color: var(--winamp-green);
            font-weight: bold;
        }

        #visualizer { width: 110px; height: 50px; background: #000; }

        /* Kontrol Playback */
        .controls { display: flex; gap: 4px; padding: 10px 5px; justify-content: center; }
        .btn {
            background: linear-gradient(to bottom, #5d6475, #2a2e38);
            border: 1px solid #000;
            color: #eee;
            padding: 6px 10px;
            font-size: 10px;
            cursor: pointer;
            min-width: 50px;
            text-transform: uppercase;
        }
        .btn.active { color: var(--winamp-green); border-color: var(--winamp-green); }

        /* Pencarian & Playlist */
        .search-area { padding: 0 5px 5px; }
        #search-input {
            width: 100%; background: #000; border: 1px solid #444;
            color: var(--winamp-green); font-size: 11px; padding: 5px; box-sizing: border-box;
        }

        .playlist-area {
            background: #000; height: 200px; margin: 0 5px;
            border: 1px solid #444; overflow-y: auto;
        }
        .playlist-item {
            display: flex; justify-content: space-between; padding: 6px 12px;
            font-size: 12px; color: var(--winamp-yellow); cursor: pointer; border-bottom: 1px solid #111;
        }
        .playlist-item.active { background: var(--active-blue); color: white; }
        .empty-msg { color: #555; text-align: center; margin-top: 80px; font-size: 13px; }

        /* Dropdown Folder (Tengah Bawah) */
        .folder-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px 10px;
            border-top: 1px solid #444;
            margin-top: 10px;
        }
        .folder-selection label { font-size: 10px; margin-bottom: 5px; color: #888; }
        #category-select {
            width: 200px;
            background: #222;
            color: var(--winamp-yellow);
            border: 1px solid #555;
            padding: 5px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        input[type=range] { width: 95%; margin: 5px 10px; accent-color: var(--winamp-green); cursor: pointer; }
    </style>
</head>
<body>

<div id="winamp-container">
    <div style="font-size: 10px; padding: 2px 10px; color: #777;">WINAMP 0.91 - IPPNUDA PLAYER</div>
    
    <div class="display-panel">
        <div>
            <div id="time-display">00:00</div>
            <div id="song-title" style="font-size: 11px; width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">Memuat...</div>
        </div>
        <canvas id="visualizer"></canvas>
    </div>

    <input type="range" id="seek-bar" value="0" max="100">

    <div class="controls">
        <button class="btn" onclick="prevTrack()">PREV</button>
        <button class="btn" onclick="playTrack()">PLAY</button>
        <button class="btn" onclick="pauseTrack()">PAUSE</button>
        <button class="btn" onclick="stopTrack()">STOP</button>
        <button class="btn" onclick="nextTrack()">NEXT</button>
        <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHF</button>
    </div>

    <div class="search-area">
        <input type="text" id="search-input" placeholder="Cari lagu di playlist..." oninput="renderPlaylist()">
    </div>

    <div class="playlist-area" id="playlist"></div>

    <div class="folder-selection">
        <label>GANTI PLAYLIST / FOLDER:</label>
        <select id="category-select" onchange="switchCategory(this.value)">
            </select>
    </div>
</div>

<audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    // DATA MASTER (Sudah diarahkan ke sub-folder masing-masing)
    const masterPlaylists = {
        "pop": [
            { title: "Ada Apa Denganmu", url: "music/pop/1. Peterpan - Ada Apa Denganmu .mp3", duration: "4:41" },
            { title: "Mungkin Nanti", url: "music/pop/2. Peterpan - Mungkin Nanti.mp3", duration: "4:29" },
            { title: "Khayalan Tingkat tinggi", url: "music/pop/3. Peterpan - Khayalan Tingkat.mp3", duration: "3:36" },
            { title: "Dibelakangku", url: "music/pop/4. Peterpan - Di Belakangku.mp3", duration: "3:45" },
            { title: "Ku Katakan Dengan Indah", url: "music/pop/5. Peterpan - Ku Katakan Dengan Indah.mp3", duration: "5:34" },
            { title: "2 DSD", url: "music/pop/6. Peterpan - 2 DSD.mp3", duration: "3:41" },
            { title: "Diatas Normal", url: "music/pop/7. Peterpan - Diatas Normal.mp3", duration: "3:35" },
            { title: "Aku", url: "music/pop/8.Peterpan - Aku.mp3", duration: "3:02" },
            { title: "Masa Lalu Tertinggal", url: "music/pop/9. Peterpan - Masa Lalu Tertinggal.mp3", duration: "3:57" },
            { title: "Bintang Di Surga", url: "music/pop/10. Peterpan - Bintang Di Surga.mp3", duration: "5:02" }
        ],
        "Obro-obrog": [],
        "Sholawatan": [],
        "Dangdut": [],
        "Anak-anak": [],
        "Tarling": [],
        "Barat": [],
        "Qiro": [],
        "Ceramah": [],
        "Murotal": []
    };

    let currentCat = "pop";
    let currentTrackIndex = 0;
    let isShuffle = false;

    const audio = document.getElementById('audio-player');
    const playlistElement = document.getElementById('playlist');
    const timeDisplay = document.getElementById('time-display');
    const songTitleDisplay = document.getElementById('song-title');
    const seekBar = document.getElementById('seek-bar');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const searchInput = document.getElementById('search-input');
    const categorySelect = document.getElementById('category-select');

    // VISUALIZER
    let audioCtx, analyser, canvas, ctx, source;
    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        analyser.fftSize = 64; draw();
    }
    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        let x = 0;
        for(let i=0; i<data.length; i++){
            let h = data[i]/2; ctx.fillStyle = `rgb(0,${data[i]+100},0)`;
            ctx.fillRect(x, canvas.height-h, 2, h); x += 4;
        }
    }

    // LOGIC FOLDER & PLAYLIST
    function initApp() {
        Object.keys(masterPlaylists).forEach(cat => {
            let opt = document.createElement('option');
            opt.value = cat; opt.innerText = cat;
            categorySelect.appendChild(opt);
        });
        loadTrack(0);
    }

    function switchCategory(cat) {
        currentCat = cat;
        searchInput.value = "";
        currentTrackIndex = 0;
        if(masterPlaylists[cat].length > 0) {
            loadTrack(0); audio.play();
        } else {
            renderPlaylist();
            songTitleDisplay.innerText = "Playlist Kosong";
            audio.src = ""; timeDisplay.innerText = "00:00";
        }
    }

    function renderPlaylist() {
        playlistElement.innerHTML = "";
        const songs = masterPlaylists[currentCat];
        const filter = searchInput.value.toLowerCase();

        if (songs.length === 0) {
            playlistElement.innerHTML = '<div class="empty-msg">Folder ini masih kosong...</div>';
            return;
        }

        songs.forEach((song, index) => {
            if (song.title.toLowerCase().includes(filter)) {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `<span>${index + 1}. ${song.title}</span><span style="color:#0f0">${song.duration}</span>`;
                item.onclick = () => { currentTrackIndex = index; loadTrack(index); audio.play(); };
                playlistElement.appendChild(item);
            }
        });
    }

    function loadTrack(index) {
        const songs = masterPlaylists[currentCat];
        if (songs.length === 0) return;
        audio.src = songs[index].url;
        songTitleDisplay.innerText = `${index + 1}. ${songs[index].title}`;
        renderPlaylist();
    }

    function playTrack() { initVisualizer(); if(audioCtx.state==='suspended') audioCtx.resume(); if(audio.src) audio.play(); }
    function pauseTrack() { audio.pause(); }
    function stopTrack() { audio.pause(); audio.currentTime = 0; }
    function nextTrack() {
        const s = masterPlaylists[currentCat]; if(s.length===0) return;
        currentTrackIndex = isShuffle ? Math.floor(Math.random()*s.length) : (currentTrackIndex+1)%s.length;
        loadTrack(currentTrackIndex); audio.play();
    }
    function prevTrack() {
        const s = masterPlaylists[currentCat]; if(s.length===0) return;
        currentTrackIndex = (currentTrackIndex-1+s.length)%s.length;
        loadTrack(currentTrackIndex); audio.play();
    }
    function toggleShuffle() { isShuffle = !isShuffle; shuffleBtn.classList.toggle('active'); }

    audio.addEventListener('timeupdate', () => {
        seekBar.value = (audio.currentTime/audio.duration)*100 || 0;
        let m = Math.floor(audio.currentTime/60), s = Math.floor(audio.currentTime%60);
        timeDisplay.innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
    });
    seekBar.oninput = () => audio.currentTime = (seekBar.value/100)*audio.duration;
    audio.addEventListener('ended', nextTrack);

    initApp();
</script>
</body>
</html>
