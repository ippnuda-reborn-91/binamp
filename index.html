<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Bento Pro - Multi Playlist</title>
    <style>
        :root {
            --winamp-bg: #383d49;
            --winamp-dark: #1a1a1b;
            --winamp-display: #000000;
            --winamp-green: #00ff00;
            --winamp-text: #b4b9c5;
            --winamp-yellow: #ffff00;
            --active-blue: #204a87;
        }

        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px 0;
            font-family: Arial, sans-serif;
            color: var(--winamp-text);
        }

        #winamp-container {
            width: 420px;
            background: var(--winamp-bg);
            border: 1px solid #111;
            border-radius: 4px;
            padding: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .top-bar {
            height: 22px;
            background: linear-gradient(to bottom, #5d6475, #383d49);
            font-size: 10px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-weight: bold;
            border-bottom: 1px solid #111;
        }

        /* LCD Display & Visualizer */
        .display-panel {
            background: var(--winamp-display);
            margin: 8px 5px;
            padding: 10px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .lcd-text { flex: 1; }

        #time-display {
            font-family: 'Courier New', monospace;
            font-size: 30px;
            color: var(--winamp-green);
            font-weight: bold;
        }

        #visualizer {
            width: 120px;
            height: 50px;
            background: #000;
            border-left: 1px solid #333;
        }

        /* Controls */
        .controls { display: flex; gap: 3px; padding: 5px; flex-wrap: wrap; }
        .btn {
            background: linear-gradient(to bottom, #5d6475, #2a2e38);
            border: 1px solid #000;
            color: #eee;
            padding: 4px 8px;
            font-size: 9px;
            cursor: pointer;
            min-width: 45px;
            text-transform: uppercase;
        }
        .btn.active { background: #005500; color: var(--winamp-green); border-color: var(--winamp-green); }

        /* Category Selector */
        .category-container {
            margin: 10px 5px;
            padding: 5px;
            background: #272b35;
            border: 1px inset #111;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .cat-btn {
            background: #444b59;
            border: 1px solid #111;
            color: #bdc5d6;
            font-size: 8px;
            padding: 4px 2px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }

        .cat-btn.active {
            background: var(--active-blue);
            color: white;
        }

        /* Playlist */
        .playlist-header { font-size: 10px; font-weight: bold; padding: 5px 10px; color: var(--winamp-yellow); }
        .playlist-area {
            background: #000;
            height: 180px;
            margin: 0 5px 5px;
            border: 1px solid #444;
            overflow-y: auto;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            font-size: 11px;
            color: var(--winamp-yellow);
            cursor: pointer;
            border-bottom: 1px solid #111;
        }

        .playlist-item.active { background: var(--active-blue); color: white; }
        .playlist-item .dur { color: var(--winamp-green); }

        /* Custom Scrollbar */
        .playlist-area::-webkit-scrollbar { width: 8px; }
        .playlist-area::-webkit-scrollbar-track { background: #111; }
        .playlist-area::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>

<div id="winamp-container">
    <div class="top-bar">WINAMP 5.92 - IPPNUDA PLAYER</div>
    
    <div class="display-panel">
        <div class="lcd-text">
            <div id="time-display">00:00</div>
            <div id="song-title" style="font-size: 10px; width: 200px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">Pilih Folder...</div>
        </div>
        <canvas id="visualizer"></canvas>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevTrack()">PREV</button>
        <button class="btn" onclick="playTrack()">PLAY</button>
        <button class="btn" onclick="pauseTrack()">PAUSE</button>
        <button class="btn" onclick="stopTrack()">STOP</button>
        <button class="btn" onclick="nextTrack()">NEXT</button>
        <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHUFFLE</button>
    </div>

    <input type="range" id="seek-bar" value="0" max="100" style="width:96%; margin: 5px 8px; accent-color:#00ff00; cursor:pointer;">

    <div class="playlist-header">CATEGORY / FOLDER</div>
    <div class="category-container">
        <div class="category-grid" id="category-list"></div>
    </div>

    <div class="playlist-header" id="current-cat-label">PLAYLIST: POP</div>
    <div class="playlist-area" id="playlist"></div>
</div>

<audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    const masterPlaylists = {
        "Pop": [
            { title: "Ada Apa Denganmu", url: "music/1. Peterpan - Ada Apa Denganmu .mp3", duration: "4:41" },
            { title: "Mungkin Nanti", url: "music/2. Peterpan - Mungkin Nanti.mp3", duration: "4:29" },
            { title: "Khayalan Tingkat tinggi", url: "music/3. Peterpan - Khayalan Tingkat.mp3", duration: "3:36" }
        ],
        "Obro-obrog": [{ title: "Lagu Obrog 1", url: "music/Obro-obrog/1.mp3", duration: "0:00" }],
        "Sholawatan": [{ title: "Sholawat 1", url: "music/sholawatan/1.mp3", duration: "0:00" }],
        "Dangdut": [{ title: "Dangdut 1", url: "music/dangdut/1.mp3", duration: "0:00" }],
        "Anak-anak": [{ title: "Lagu Anak 1", url: "music/Anak-anak/1.mp3", duration: "0:00" }],
        "Tarling": [{ title: "Tarling 1", url: "music/tarling/1.mp3", duration: "0:00" }],
        "Barat": [{ title: "West Song 1", url: "music/barat/1.mp3", duration: "0:00" }],
        "Qiro": [{ title: "Qiroah 1", url: "music/qiro/1.mp3", duration: "0:00" }],
        "Ceramah": [{ title: "Ceramah 1", url: "music/ceramah/1.mp3", duration: "0:00" }],
        "Murotal": [{ title: "Murotal 1", url: "music/murotal/1.mp3", duration: "0:00" }]
    };

    let currentCat = "Pop";
    let currentSongs = masterPlaylists[currentCat];
    let currentTrackIndex = 0;
    let isShuffle = false;

    const audio = document.getElementById('audio-player');
    const playlistElement = document.getElementById('playlist');
    const categoryElement = document.getElementById('category-list');
    const timeDisplay = document.getElementById('time-display');
    const songTitleDisplay = document.getElementById('song-title');
    const seekBar = document.getElementById('seek-bar');
    const shuffleBtn = document.getElementById('shuffle-btn');

    // VISUALIZER LOGIC
    let audioCtx, analyser, canvas, ctx, source;

    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 64;
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const barWidth = (canvas.width / bufferLength) * 2;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const barHeight = dataArray[i] / 2;
            ctx.fillStyle = `rgb(0, ${dataArray[i] + 100}, 0)`;
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            x += barWidth + 2;
        }
    }

    // SYSTEM LOGIC
    function renderCategories() {
        categoryElement.innerHTML = "";
        Object.keys(masterPlaylists).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-btn ${cat === currentCat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCategory(cat);
            categoryElement.appendChild(btn);
        });
    }

    function switchCategory(cat) {
        currentCat = cat;
        currentSongs = masterPlaylists[cat];
        document.getElementById('current-cat-label').innerText = `PLAYLIST: ${cat.toUpperCase()}`;
        renderCategories();
        loadTrack(0);
        audio.play();
    }

    function renderPlaylist() {
        playlistElement.innerHTML = "";
        currentSongs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
            item.innerHTML = `<span>${index + 1}. ${song.title}</span><span class="dur">${song.duration}</span>`;
            item.onclick = () => playSpecific(index);
            playlistElement.appendChild(item);
        });
    }

    function loadTrack(index) {
        currentTrackIndex = index;
        audio.src = currentSongs[index].url;
        songTitleDisplay.innerText = `${index + 1}. ${currentSongs[index].title}`;
        renderPlaylist();
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active');
    }

    function playTrack() {
        initVisualizer();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!audio.src) loadTrack(0);
        audio.play();
    }

    function nextTrack() {
        if (isShuffle) {
            currentTrackIndex = Math.floor(Math.random() * currentSongs.length);
        } else {
            currentTrackIndex = (currentTrackIndex + 1) % currentSongs.length;
        }
        loadTrack(currentTrackIndex);
        audio.play();
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + currentSongs.length) % currentSongs.length;
        loadTrack(currentTrackIndex);
        audio.play();
    }

    function pauseTrack() { audio.pause(); }
    function stopTrack() { audio.pause(); audio.currentTime = 0; }
    function playSpecific(index) { loadTrack(index); audio.play(); }

    audio.addEventListener('timeupdate', () => {
        seekBar.value = (audio.currentTime / audio.duration) * 100 || 0;
        let m = Math.floor(audio.currentTime / 60);
        let s = Math.floor(audio.currentTime % 60);
        timeDisplay.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    });

    seekBar.oninput = () => { audio.currentTime = (seekBar.value / 100) * audio.duration; };
    audio.addEventListener('ended', nextTrack);

    // Startup
    renderCategories();
    loadTrack(0);
</script>

</body>
</html>
