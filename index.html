<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Bento Pro - Mobile Ready</title>
    <style>
        :root {
            --winamp-bg: #383d49;
            --winamp-display: #000000;
            --winamp-green: #00ff00;
            --winamp-text: #b4b9c5;
            --winamp-yellow: #ffff00;
            --active-blue: #204a87;
        }

        /* Skin Themes */
        .skin-classic { --winamp-bg: #383d49; --active-blue: #204a87; --winamp-green: #00ff00; }
        .skin-dark { --winamp-bg: #1a1a1a; --active-blue: #444; --winamp-green: #00d4ff; }
        .skin-ruby { --winamp-bg: #4a1a1a; --active-blue: #8b0000; --winamp-green: #ff4d4d; }
        .skin-emerald { --winamp-bg: #1a4a2e; --active-blue: #006400; --winamp-green: #aaff00; }
        .skin-midnight { --winamp-bg: #1e1e2f; --active-blue: #3f3f5f; --winamp-green: #bb86fc; }

        * { box-sizing: border-box; } /* Mencegah elemen meluap */

        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-family: Arial, sans-serif;
            color: var(--winamp-text);
        }

        #winamp-container {
            width: 100%;
            max-width: 440px;
            background: var(--winamp-bg);
            border: 1px solid #111;
            border-radius: 4px;
            padding: 5px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            position: relative;
        }

        .skin-header {
            position: absolute;
            top: 5px;
            right: 10px;
            z-index: 10;
        }
        .skin-select {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            font-size: 9px;
            padding: 2px;
            cursor: pointer;
        }

        .display-panel {
            background: var(--winamp-display);
            margin: 25px 5px 5px 5px;
            padding: 10px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 75px;
            overflow: hidden;
        }

        #time-display {
            font-family: 'Courier New', monospace;
            font-size: 30px;
            color: var(--winamp-green);
            font-weight: bold;
        }

        #song-title {
            font-size: 11px;
            width: 180px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color: var(--winamp-text);
        }

        #visualizer { width: 100px; height: 40px; background: #000; }

        .controls { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 2px; 
            padding: 8px 5px; 
            justify-content: center; 
        }
        .btn {
            background: linear-gradient(to bottom, #5d6475, #2a2e38);
            border: 1px solid #000;
            color: #eee;
            padding: 5px 0;
            font-size: 9px;
            cursor: pointer;
            flex: 1;
            min-width: 45px;
            text-transform: uppercase;
        }
        .btn:active { background: #111; color: var(--winamp-green); }
        .btn.active { border-color: var(--winamp-green); color: var(--winamp-green); }

        /* Equalizer - Tinggi Dikurangi agar Proporsional */
        .eq-ornament {
            background: rgba(0,0,0,0.2);
            border: 1px inset #111;
            margin: 5px;
            display: flex;
            justify-content: space-between;
            height: 50px;
            padding: 10px 8px;
        }
        .eq-bar { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 8%; 
            position: relative;
        }
        .eq-slider {
            -webkit-appearance: none;
            width: 30px; /* Lebar slider disesuaikan tinggi container */
            height: 2px;
            background: #111;
            transform: rotate(-90deg);
            margin-top: 15px; /* Menengahkan slider */
            cursor: pointer;
        }
        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 6px;
            background: #bdc5d6; border: 1px solid #000;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            padding: 5px;
            margin: 5px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
        }
        
        /* Grid responsif untuk HP kecil */
        @media (max-width: 380px) {
            .playlist-grid { grid-template-columns: repeat(3, 1fr); }
            #song-title { width: 120px; }
        }

        .cat-btn {
            background: #444b59;
            border: 1px solid #111;
            color: #bdc5d6;
            font-size: 8px;
            padding: 4px 2px;
            cursor: pointer;
            text-align: center;
            overflow: hidden;
        }
        .cat-btn.active { background: var(--active-blue); color: white; }

        .search-area { padding: 5px; }
        #search-input {
            width: 100%; background: #000; border: 1px solid #444;
            color: var(--winamp-green); font-size: 11px; padding: 5px;
            outline: none;
        }

        .playlist-area {
            background: #000;
            height: 250px;
            margin: 5px;
            border: 1px solid #444;
            overflow-y: auto;
        }
        .playlist-item {
            display: flex; justify-content: space-between; padding: 6px 10px;
            font-size: 11px; color: var(--winamp-yellow); cursor: pointer; border-bottom: 1px solid #111;
        }
        .playlist-item.active { background: var(--active-blue); color: white; }

        input[type=range]#seek-bar { 
            width: calc(100% - 20px); 
            margin: 5px 10px; 
            accent-color: var(--winamp-green); 
            cursor: pointer; 
        }
    </style>
</head>
<body class="skin-classic">

<div id="winamp-container">
    <div class="skin-header">
        <select class="skin-select" onchange="changeSkin(this.value)">
            <option value="classic">SKIN: CLASSIC</option>
            <option value="dark">SKIN: MODERN DARK</option>
            <option value="ruby">SKIN: RUBY RED</option>
            <option value="emerald">SKIN: EMERALD</option>
            <option value="midnight">SKIN: MIDNIGHT</option>
        </select>
    </div>

    <div style="font-size: 9px; padding: 2px 10px; color: #777;">WINAMP 0.91 - IPPNUDA PLAYER</div>
    
    <div class="display-panel">
        <div>
            <div id="time-display">00:00</div>
            <div id="song-title">Memuat Lagu...</div>
        </div>
        <canvas id="visualizer"></canvas>
    </div>

    <input type="range" id="seek-bar" value="0" max="100">

    <div class="controls">
        <button class="btn" onclick="prevTrack()">PREV</button>
        <button class="btn" onclick="playTrack()">PLAY</button>
        <button class="btn" onclick="pauseTrack()">PAUSE</button>
        <button class="btn" onclick="stopTrack()">STOP</button>
        <button class="btn" onclick="nextTrack()">NEXT</button>
        <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHF</button>
    </div>

    <div class="eq-ornament">
        <div class="eq-bar"><input type="range" class="eq-slider" value="70"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="40"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="80"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="60"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="30"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="90"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="50"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="75"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="45"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="65"></div>
    </div>

    <div class="playlist-grid" id="category-grid"></div>

    <div class="search-area">
        <input type="text" id="search-input" placeholder="Cari lagu..." oninput="renderPlaylist()">
    </div>

    <div class="playlist-area" id="playlist"></div>
</div>

<audio id="audio-player" crossorigin="anonymous" preload="auto"></audio>

<script>
    const masterPlaylists = {
        "pop": [
            { title: "Ada Apa Denganmu", url: "music/1. Peterpan - Ada Apa Denganmu .mp3", duration: "4:41" },
            { title: "Mungkin Nanti", url: "music/2. Peterpan - Mungkin Nanti.mp3", duration: "4:29" },
            { title: "Khayalan Tinggi", url: "music/3. Peterpan - Khayalan Tingkat.mp3", duration: "3:36" },
            { title: "Dibelakangku", url: "music/4. Peterpan - Di Belakangku.mp3", duration: "5:02" },
            { title: "Ku Katakan Dengan Indah", url: "music/5. Peterpan - Ku Katakan Dengan Indah.mp3", duration: "5:34" },
            { title: "2 DSD", url: "music/6. Peterpan - 2 DSD.mp3", duration: "3:41" },
            { title: "Diatas Normal", url: "music/7. Peterpan - Diatas Normal.mp3", duration: "3:35" },
            { title: "Aku", url: "music/8.Peterpan - Aku.mp3", duration: "3:02" },
            { title: "Masa Lalu Tertinggal", url: "music/9. Peterpan - Masa Lalu Tertinggal.mp3", duration: "3:57" },
            { title: "Bintang Di Surga", url: "music/10. Peterpan - Bintang Di Surga.mp3", duration: "5:02" }
        ],
        "Obrog": [
            { title: "Ya Ramadhan", url: "music/Obro-obrog/Nasida_Ria_Ya_Ramadhan.mp3", duration: "3:43" },
            { title: "Magadir", url: "music/Obro-obrog/Masud_Sidiq_Magadir.mp3", duration: "11:38" }
        ],
        "Sholawat": [], "Dangdut": [], "Anak": [], "Tarling": [], "Barat": [], "Ceramah": [], 
        "Murotal": [
            { title: "Juz 1 - سْمِ اللَّهِ", url: "music/Murotal/juz1.mp3", duration: "53:51" },
            { title: "Juz 2 - سَيَقُولُ", url: "music/Murotal/Juz2.mp3", duration: "51:47" }
        ]
    };

    let currentCat = "pop", currentTrackIndex = 0, isShuffle = false;
    const audio = document.getElementById('audio-player'), playlistElement = document.getElementById('playlist');
    const timeDisplay = document.getElementById('time-display'), songTitleDisplay = document.getElementById('song-title');
    const seekBar = document.getElementById('seek-bar'), categoryGrid = document.getElementById('category-grid');
    const searchInput = document.getElementById('search-input');

    let audioCtx, analyser, canvas, ctx, source;

    function changeSkin(skinName) { document.body.className = 'skin-' + skinName; }

    function initVisualizer() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            canvas = document.getElementById('visualizer'); ctx = canvas.getContext('2d');
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser); analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; draw();
        } catch(e) { console.error(e); }
    }

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        let x = 0;
        for(let i=0; i<data.length; i++){
            let h = data[i]/4; // Sesuaikan skala tinggi visualizer
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--winamp-green');
            ctx.fillRect(x, canvas.height-h, 2, h); x += 4;
        }
    }

    function renderCategories() {
        categoryGrid.innerHTML = "";
        Object.keys(masterPlaylists).forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${cat === currentCat ? 'active' : ''}`;
            btn.innerText = cat.toUpperCase();
            btn.onclick = () => {
                currentCat = cat; currentTrackIndex = 0;
                renderCategories(); loadTrack(0, true);
            };
            categoryGrid.appendChild(btn);
        });
    }

    function loadTrack(index, autoPlay = false) {
        const songs = masterPlaylists[currentCat];
        if (!songs || songs.length === 0) {
            playlistElement.innerHTML = '<div style="color:#555; text-align:center; padding-top:50px;">Folder Kosong</div>';
            songTitleDisplay.innerText = "Kosong";
            return;
        }
        currentTrackIndex = index;
        audio.src = encodeURI(songs[index].url);
        songTitleDisplay.innerText = `${index + 1}. ${songs[index].title}`;
        renderPlaylist();
        audio.load();
        if (autoPlay) playTrack();
    }

    function renderPlaylist() {
        playlistElement.innerHTML = "";
        const songs = masterPlaylists[currentCat];
        const filter = searchInput.value.toLowerCase();
        
        songs.forEach((song, index) => {
            if (song.title.toLowerCase().includes(filter)) {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `<span>${index + 1}. ${song.title}</span><span style="color:var(--winamp-green)">${song.duration}</span>`;
                item.onclick = () => loadTrack(index, true);
                playlistElement.appendChild(item);
            }
        });
    }

    function playTrack() {
        initVisualizer();
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        audio.play().catch(e => console.log("Interaksi user diperlukan untuk memulai audio"));
    }

    function pauseTrack() { audio.pause(); }
    function stopTrack() { audio.pause(); audio.currentTime = 0; }
    
    function nextTrack() {
        const s = masterPlaylists[currentCat]; if(!s || s.length === 0) return;
        currentTrackIndex = isShuffle ? Math.floor(Math.random()*s.length) : (currentTrackIndex+1)%s.length;
        loadTrack(currentTrackIndex, true);
    }
    
    function prevTrack() {
        const s = masterPlaylists[currentCat]; if(!s || s.length === 0) return;
        currentTrackIndex = (currentTrackIndex-1+s.length)%s.length;
        loadTrack(currentTrackIndex, true);
    }
    
    function toggleShuffle() { 
        isShuffle = !isShuffle; 
        document.getElementById('shuffle-btn').classList.toggle('active'); 
    }

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) seekBar.value = (audio.currentTime / audio.duration) * 100;
        let m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
        timeDisplay.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    });

    seekBar.oninput = () => { if (audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration; };
    audio.addEventListener('ended', nextTrack);

    renderCategories();
    loadTrack(0, false);
</script>
</body>
</html>
