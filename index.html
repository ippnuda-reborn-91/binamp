<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Bento - Fixed</title>
    <style>
        :root {
            --winamp-bg: #383d49;
            --winamp-display: #000000;
            --winamp-green: #00ff00;
            --winamp-text: #b4b9c5;
            --winamp-yellow: #ffff00;
            --active-blue: #204a87;
        }

        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: var(--winamp-text);
        }

        #winamp-container {
            width: 400px;
            background: var(--winamp-bg);
            border: 1px solid #111;
            border-radius: 4px;
            padding: 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        .display-panel {
            background: var(--winamp-display);
            margin: 5px;
            padding: 12px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
        }

        #time-display {
            font-family: 'Courier New', monospace;
            font-size: 32px;
            color: var(--winamp-green);
            font-weight: bold;
        }

        #visualizer { width: 110px; height: 50px; background: #000; }

        .controls { display: flex; gap: 4px; padding: 10px 5px; justify-content: center; }
        
        .btn {
            background: linear-gradient(to bottom, #5d6475, #2a2e38);
            border: 1px solid #000;
            color: #eee;
            padding: 6px 10px;
            font-size: 10px;
            cursor: pointer;
            min-width: 52px;
        }

        /* Ornamen Equalizer - Diletakkan di bawah kontrol */
        .eq-ornament {
            background: #2b303b;
            border: 1px inset #111;
            margin: 5px;
            display: flex;
            justify-content: space-around;
            height: 80px; /* Tinggi ditambah agar tidak pendek */
            padding: 15px 10px;
        }

        .eq-bar { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .eq-slider {
            -webkit-appearance: none;
            width: 60px; /* Panjang slider ditingkatkan */
            height: 2px;
            background: #111;
            transform: rotate(-90deg);
            margin-top: 25px;
            cursor: default;
        }

        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 7px;
            background: #bdc5d6; border: 1px solid #000;
            border-radius: 1px;
        }

        .playlist-area {
            background: #000; height: 180px; margin: 5px;
            border: 1px solid #444; overflow-y: auto;
        }

        .playlist-item {
            display: flex; justify-content: space-between; padding: 6px 12px;
            font-size: 12px; color: var(--winamp-yellow); cursor: pointer; border-bottom: 1px solid #111;
        }

        .playlist-item.active { background: var(--active-blue); color: white; }
        
        .folder-selection {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; border-top: 1px solid #444; margin-top: 5px;
        }

        #category-select {
            width: 220px; background: #222; color: var(--winamp-yellow);
            border: 1px solid #555; padding: 6px; cursor: pointer;
        }

        input[type=range]#seek-bar { width: 95%; margin: 5px 10px; accent-color: var(--winamp-green); }
    </style>
</head>
<body>

<div id="winamp-container">
    <div style="font-size: 10px; padding: 2px 10px; color: #777;">WINAMP 0.91 - IPPNUDA PLAYER</div>
    
    <div class="display-panel">
        <div>
            <div id="time-display">00:00</div>
            <div id="song-title" style="font-size: 11px; width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">Memuat...</div>
        </div>
        <canvas id="visualizer"></canvas>
    </div>

    <input type="range" id="seek-bar" value="0" max="100">

    <div class="controls">
        <button class="btn" onclick="prevTrack()">PREV</button>
        <button class="btn" onclick="playTrack()">PLAY</button>
        <button class="btn" onclick="pauseTrack()">PAUSE</button>
        <button class="btn" onclick="stopTrack()">STOP</button>
        <button class="btn" onclick="nextTrack()">NEXT</button>
        <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">SHF</button>
    </div>

    <div class="eq-ornament">
        <div class="eq-bar"><input type="range" class="eq-slider" value="70"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="40"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="80"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="60"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="30"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="90"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="50"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="75"></div>
        <div class="eq-bar"><input type="range" class="eq-slider" value="45"></div>
    </div>

    <div class="playlist-area" id="playlist"></div>

    <div class="folder-selection">
        <select id="category-select" onchange="switchCategory(this.value)"></select>
    </div>
</div>

<audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    const masterPlaylists = {
        "pop": [
            { title: "Ada Apa Denganmu", url: "music/pop/Peterpan_Ada_Apa_Denganmu.mp3", duration: "4:41" },
            { title: "Mungkin Nanti", url: "music/pop/Peterpan_Mungkin_Nanti.mp3", duration: "4:29" },
            { title: "Khayalan Tingkat tinggi", url: "music/pop/Peterpan_Khayalan_Tingkat_Tinggi.mp3", duration: "3:36" },
            { title: "Dibelakangku", url: "music/pop/Peterpan_Di_Belakangku.mp3", duration: "3:45" },
            { title: "Ku Katakan Dengan Indah", url: "music/pop/Peterpan_Ku_Katakan_Dengan_Indah.mp3", duration: "5:34" },
            { title: "2 DSD", url: "music/pop/Peterpan_2_DSD.mp3", duration: "3:41" },
            { title: "Diatas Normal", url: "music/pop/Peterpan_Diatas_Normal.mp3", duration: "3:35" },
            { title: "Aku", url: "music/pop/Peterpan_Aku.mp3", duration: "3:02" },
            { title: "Masa Lalu Tertinggal", url: "music/pop/Peterpan_Masa_Lalu_Tertinggal.mp3", duration: "3:57" },
            { title: "Bintang Di Surga", url: "music/pop/Peterpan_Bintang_Di_Surga.mp3", duration: "5:02" }
        ],
        "Obro-obrog": [], "Sholawatan": [], "Dangdut": [], "Anak-anak": [], "Tarling": [], "Barat": [], "Qiro": [], "Ceramah": [], "Murotal": []
    };

    let currentCat = "pop", currentTrackIndex = 0, isShuffle = false;
    const audio = document.getElementById('audio-player'), playlistElement = document.getElementById('playlist');
    const timeDisplay = document.getElementById('time-display'), songTitleDisplay = document.getElementById('song-title');
    const seekBar = document.getElementById('seek-bar'), categorySelect = document.getElementById('category-select');

    let audioCtx, analyser, canvas, ctx, source;
    
    function initVisualizer() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            canvas = document.getElementById('visualizer');
            ctx = canvas.getContext('2d');
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            draw();
        } catch(e) { console.error("Visualizer error:", e); }
    }

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        let x = 0;
        for(let i=0; i<data.length; i++){
            let h = data[i]/2;
            ctx.fillStyle = `rgb(0,${data[i]+100},0)`;
            ctx.fillRect(x, canvas.height-h, 2, h);
            x += 4;
        }
    }

    function loadTrack(index) {
        const songs = masterPlaylists[currentCat];
        if (!songs || songs.length === 0) return;
        currentTrackIndex = index;
        
        // Menggunakan encodeURI untuk menangani spasi dan titik pada nama file secara otomatis
        audio.src = encodeURI(songs[index].url);
        songTitleDisplay.innerText = `${index + 1}. ${songs[index].title}`;
        renderPlaylist();
    }

    function switchCategory(cat) {
        currentCat = cat;
        currentTrackIndex = 0;
        if(masterPlaylists[cat] && masterPlaylists[cat].length > 0) {
            loadTrack(0);
            audio.play().catch(e => console.log("Klik PLAY untuk memulai"));
        } else {
            playlistElement.innerHTML = '<div class="empty-msg">Playlist Kosong</div>';
            songTitleDisplay.innerText = "Kosong";
            audio.src = "";
        }
    }

    function renderPlaylist() {
        playlistElement.innerHTML = "";
        const songs = masterPlaylists[currentCat];
        if (!songs || songs.length === 0) return;

        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
            item.innerHTML = `<span>${index + 1}. ${song.title}</span><span style="color:#0f0">${song.duration}</span>`;
            item.onclick = () => { currentTrackIndex = index; loadTrack(index); audio.play(); };
            playlistElement.appendChild(item);
        });
    }

    function playTrack() {
        initVisualizer();
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        if(audio.src) audio.play();
    }

    function nextTrack() {
        const s = masterPlaylists[currentCat];
        if(!s || s.length === 0) return;
        currentTrackIndex = isShuffle ? Math.floor(Math.random()*s.length) : (currentTrackIndex+1)%s.length;
        loadTrack(currentTrackIndex);
        audio.play();
    }

    function prevTrack() {
        const s = masterPlaylists[currentCat];
        if(!s || s.length === 0) return;
        currentTrackIndex = (currentTrackIndex-1+s.length)%s.length;
        loadTrack(currentTrackIndex);
        audio.play();
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        document.getElementById('shuffle-btn').classList.toggle('active');
    }

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            seekBar.value = (audio.currentTime / audio.duration) * 100;
        }
        let m = Math.floor(audio.currentTime / 60);
        let s = Math.floor(audio.currentTime % 60);
        timeDisplay.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    });

    seekBar.oninput = () => {
        if (audio.duration) {
            audio.currentTime = (seekBar.value / 100) * audio.duration;
        }
    };

    audio.addEventListener('ended', nextTrack);

    // Inisialisasi awal
    Object.keys(masterPlaylists).forEach(cat => {
        let opt = document.createElement('option');
        opt.value = cat;
        opt.innerText = cat;
        categorySelect.appendChild(opt);
    });
    
    loadTrack(0);
</script>
</body>
</html>
